name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: make install

      - name: Lint
        run: make lint

      - name: Audit production dependencies
        run: make audit

      - name: Audit dev dependencies (informational)
        run: make audit-full
        continue-on-error: true

      - name: Build
        run: make build

      - name: Test
        run: xvfb-run -a make test
